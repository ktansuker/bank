<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KT Bank</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F4F6F8;
            --surface: #FFFFFF;
            --surface-soft: #F8FAFB;
            --border: #E5E9EE;
            --ink: #101828;
            --ink-soft: #667085;
            --ink-faint: #98A2B3;
            --accent: #0F9D77;
            --accent-hover: #0C7F60;
            --accent-soft: #E6F6F1;
            --danger: #E11D48;
            --danger-soft: #FDECEF;
            --success: #16A34A;
            --success-soft: #E9F9EF;
            --info: #2563EB;
            --info-soft: #EAF1FE;
            --radius: 14px;
            --shadow-card: 0 1px 2px rgba(16,24,40,0.04), 0 12px 32px -12px rgba(16,24,40,0.10);
            --shadow-btn: 0 1px 2px rgba(16,24,40,0.06);
        }

        * { box-sizing: border-box; }

        body {
            background:
                radial-gradient(1200px 600px at 15% -10%, #E9F7F1 0%, transparent 55%),
                radial-gradient(900px 500px at 100% 0%, #EEF2FF 0%, transparent 50%),
                var(--bg);
            color: var(--ink);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 48px 16px;
        }

        .page { width: 100%; max-width: 520px; }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            margin-bottom: 24px;
        }
        .brand-mark {
            width: 34px; height: 34px;
            border-radius: 9px;
            background: linear-gradient(155deg, var(--accent), #0B6E52);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 12px -2px rgba(15,157,119,0.45);
        }
        .brand-mark svg { width: 18px; height: 18px; }
        .brand-text { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 20px; letter-spacing: -0.01em; }
        .brand-text span { color: var(--accent); }

        .container {
            background-color: var(--surface);
            padding: 32px;
            width: 100%;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-card);
        }

        h1 { display: none; }

        h2 {
            font-family: 'Sora', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: var(--ink);
            margin: 28px 0 14px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        h2::before {
            content: "";
            width: 6px; height: 6px;
            border-radius: 2px;
            background: var(--accent);
            display: inline-block;
        }
        .form-group:first-of-type,
        div > h2:first-child { margin-top: 0; padding-top: 0; border-top: none; }

        .form-group { margin-bottom: 14px; }
        label {
            display: block; margin-bottom: 6px;
            font-weight: 600; font-size: 12.5px;
            color: var(--ink-soft);
        }
        input, select {
            width: 100%; padding: 11px 12px;
            font-size: 14.5px; font-family: inherit;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            background: var(--surface-soft);
            color: var(--ink);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
        }
        input::placeholder { color: var(--ink-faint); }
        input:focus, select:focus {
            border-color: var(--accent);
            background: var(--surface);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        button {
            width: 100%; padding: 12px 16px;
            font-family: inherit;
            font-weight: 600; font-size: 14.5px;
            cursor: pointer;
            border: none; border-radius: 10px;
            margin-top: 10px;
            background: var(--accent);
            color: #fff;
            box-shadow: var(--shadow-btn);
            transition: background 0.15s, transform 0.1s;
        }
        button:hover { background: var(--accent-hover); }
        button:active { transform: translateY(1px); }
        button.outline {
            background: var(--surface);
            color: var(--ink);
            border: 1.5px solid var(--border);
            box-shadow: none;
        }
        button.outline:hover { background: var(--surface-soft); border-color: var(--ink-faint); }
        button.ghost {
            background: transparent;
            color: var(--ink-soft);
            box-shadow: none;
        }
        button.ghost:hover { background: var(--surface-soft); color: var(--ink); }
        button.small { padding: 10px 14px; font-size: 13px; }

        .hidden { display: none; }

        table.balance-table {
            width: 100%; border-collapse: collapse;
            margin-bottom: 4px; font-size: 13px;
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        .balance-table th, .balance-table td {
            padding: 10px 12px; text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .balance-table tr:last-child td { border-bottom: none; }
        .balance-table th {
            color: var(--ink-soft); font-weight: 600; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.04em;
            background: var(--surface-soft);
        }
        .balance-table td { font-variant-numeric: tabular-nums; }

        .role-badge {
            font-size: 10.5px; font-weight: 700; padding: 3px 9px;
            border-radius: 999px; text-transform: uppercase; letter-spacing: 0.03em;
            background: var(--accent-soft); color: var(--accent-hover);
        }
        .scroll-table { max-height: 220px; overflow-y: auto; border-radius: 10px; }
        .scroll-table table { border-radius: 0; }
        .type-in { color: var(--success); font-weight: 600; }
        .type-out { color: var(--danger); font-weight: 600; }

        .pagination {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 10px; gap: 10px;
        }
        .pagination-info { font-size: 12px; color: var(--ink-faint); white-space: nowrap; }
        .pagination-buttons { display: flex; gap: 6px; }
        .pagination-buttons button {
            width: auto; margin-top: 0; padding: 7px 13px; font-size: 12.5px;
        }
        .pagination-buttons button:disabled {
            opacity: 0.4; cursor: not-allowed;
        }
        .pagination-buttons button:disabled:hover { background: var(--surface); }

        .welcome-line { text-align: center; color: var(--ink-soft); font-size: 14px; margin: 0 0 4px; }
        .welcome-line b { color: var(--ink); }
        .meta-line {
            text-align: center; color: var(--ink-faint); font-size: 11.5px;
            margin: 0 0 20px; line-height: 1.5;
        }
        .meta-line span { color: var(--ink-soft); font-weight: 600; }

        hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

        /* ---- Toast bildirim sistemi ---- */
        #toast-container {
            position: fixed;
            top: 20px; right: 20px;
            display: flex; flex-direction: column; gap: 10px;
            z-index: 1000;
            width: min(340px, calc(100vw - 40px));
        }
        .toast {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 4px solid var(--ink-faint);
            border-radius: 10px;
            padding: 13px 14px 13px 14px;
            box-shadow: 0 4px 10px rgba(16,24,40,0.06), 0 12px 28px -8px rgba(16,24,40,0.18);
            display: flex; align-items: flex-start; gap: 10px;
            animation: toast-in 0.28s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }
        .toast.leaving { animation: toast-out 0.22s ease-in forwards; }
        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        .toast.info { border-left-color: var(--info); }
        .toast-icon {
            width: 20px; height: 20px; flex-shrink: 0; margin-top: 1px;
            border-radius: 999px;
            display: flex; align-items: center; justify-content: center;
        }
        .toast.success .toast-icon { background: var(--success-soft); color: var(--success); }
        .toast.error .toast-icon { background: var(--danger-soft); color: var(--danger); }
        .toast.info .toast-icon { background: var(--info-soft); color: var(--info); }
        .toast-icon svg { width: 12px; height: 12px; }
        .toast-text { font-size: 13.5px; line-height: 1.4; color: var(--ink); font-weight: 500; padding-right: 6px; }
        .toast-progress {
            position: absolute; left: 0; bottom: 0; height: 2.5px;
            background: currentColor; opacity: 0.35;
            animation: toast-progress 4s linear forwards;
        }
        .toast.success .toast-progress { color: var(--success); }
        .toast.error .toast-progress { color: var(--danger); }
        .toast.info .toast-progress { color: var(--info); }

        @keyframes toast-in {
            from { opacity: 0; transform: translateX(24px) scale(0.97); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }
        @keyframes toast-out {
            from { opacity: 1; transform: translateX(0); max-height: 100px; margin-bottom: 10px; }
            to { opacity: 0; transform: translateX(24px); max-height: 0; margin-bottom: 0; padding-top: 0; padding-bottom: 0; }
        }
        @keyframes toast-progress {
            from { width: 100%; } to { width: 0%; }
        }

        @media (prefers-reduced-motion: reduce) {
            .toast, .toast.leaving { animation: none; }
            .toast-progress { animation: none; display: none; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
</head>
<body>

<div id="toast-container"></div>

<div class="page">
    <div class="brand">
        <div class="brand-mark">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7v2h20V7L12 2z" fill="white"/>
                <path d="M4 10v8h2v-8H4zm5 0v8h2v-8H9zm5 0v8h2v-8h-2zm5 0v8h2v-8h-2z" fill="white"/>
                <path d="M2 20h20v2H2v-2z" fill="white"/>
            </svg>
        </div>
        <div class="brand-text">KT <span>Bank</span></div>
    </div>

    <div class="container">
        <h1>KT BANK</h1>

        <!-- GİRİŞ EKRANI -->
        <div id="login-section">
            <div class="form-group">
                <label>Kullanıcı Adı</label>
                <input type="text" id="username" placeholder="admin">
            </div>
            <div class="form-group">
                <label>Parola</label>
                <input type="password" id="password" placeholder="admin123">
            </div>
            <button onclick="login()">Sisteme Gir</button>
        </div>

        <!-- KULLANICI (USER) PANELİ -->
        <div id="dashboard-section" class="hidden">
            <p class="welcome-line">Hoş geldin, <b id="user-display"></b></p>
            <p class="meta-line">ID: <span id="user-id-display"></span> · E-posta: <span id="user-email-display"></span><br>başkalarının size transfer yapması için bunları paylaşabilirsiniz</p>

            <h2>Bakiyeler</h2>
            <table class="balance-table" id="user-balances"></table>

            <h2>Para Yatır / Çek</h2>
            <div class="form-group">
                <label>Para Birimi</label>
                <select id="currency">
                    <option value="TRY">TRY</option>
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                </select>
            </div>
            <div class="form-group">
                <label>Miktar</label>
                <input type="number" id="amount" placeholder="0.00" min="0" step="0.01">
            </div>
            <button onclick="transaction('deposit')">Para Yatır</button>
            <button class="outline" onclick="transaction('withdraw')">Para Çek</button>

            <h2>Başka Kullanıcıya Transfer</h2>
            <div class="form-group">
                <label>Alıcı (Kullanıcı ID / E-posta / Kullanıcı Adı)</label>
                <input type="text" id="transfer-target" placeholder="42, kaan@ornek.com veya kaan">
            </div>
            <div class="form-group">
                <label>Para Birimi</label>
                <select id="transfer-currency">
                    <option value="TRY">TRY</option>
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                </select>
            </div>
            <div class="form-group">
                <label>Miktar</label>
                <input type="number" id="transfer-amount" placeholder="0.00" min="0" step="0.01">
            </div>
            <button class="outline" onclick="transfer()">Transfer Et</button>

            <h2>Döviz Bozdur</h2>
            <div class="form-group">
                <label>Kaynak Para Birimi</label>
                <select id="exchange-from">
                    <option value="TRY">TRY</option>
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                </select>
            </div>
            <div class="form-group">
                <label>Hedef Para Birimi</label>
                <select id="exchange-to">
                    <option value="USD">USD</option>
                    <option value="TRY">TRY</option>
                    <option value="EUR">EUR</option>
                </select>
            </div>
            <div class="form-group">
                <label>Miktar (Kaynak)</label>
                <input type="number" id="exchange-amount" placeholder="0.00" min="0" step="0.01">
            </div>
            <button class="outline" onclick="exchange()">Bozdur</button>

            <h2>İşlem Geçmişim</h2>
            <div class="scroll-table">
                <table class="balance-table" id="user-history"></table>
            </div>
            <div class="pagination" id="user-history-pagination"></div>

            <hr>
            <button class="ghost" onclick="logout()">Çıkış Yap</button>
        </div>

        <!-- ADMİN PANELİ -->
        <div id="admin-section" class="hidden">
            <p class="welcome-line">Hoş geldin, <b id="admin-display"></b> <span class="role-badge">Admin</span></p>

            <h2>Yeni Kullanıcı Oluştur</h2>
            <div class="form-group">
                <label>Kullanıcı Adı</label>
                <input type="text" id="new-username">
            </div>
            <div class="form-group">
                <label>E-posta</label>
                <input type="email" id="new-email" placeholder="kullanici@ornek.com">
            </div>
            <div class="form-group">
                <label>Parola</label>
                <input type="password" id="new-password">
            </div>
            <button class="small" onclick="createUser()">Kullanıcı Ekle</button>

            <h2>Tüm Kullanıcılar</h2>
            <table class="balance-table" id="admin-users"></table>
            <div class="pagination" id="admin-users-pagination"></div>

            <h2>Tüm İşlemler</h2>
            <div class="scroll-table">
                <table class="balance-table" id="admin-transactions"></table>
            </div>
            <div class="pagination" id="admin-transactions-pagination"></div>

            <hr>
            <button class="ghost" onclick="logout()">Çıkış Yap</button>
        </div>
    </div>
</div>

<script>
    let authHeader = "";
    const PAGE_SIZE = 10;
    let userHistoryPage = 0;
    let adminUsersPage = 0;
    let adminTransactionsPage = 0;

    // Sunucudan gelen PageResponse (content, page, size, totalElements, totalPages, last)
    // nesnesini okuyup "Önceki / Sonraki" butonlarını ve sayfa bilgisini çizen ortak fonksiyon.
    function renderPagination(containerId, pageData, onPageChange) {
        const container = document.getElementById(containerId);
        if (!container) return;

        if (pageData.totalElements === 0) {
            container.innerHTML = '';
            return;
        }

        const startItem = pageData.page * pageData.size + 1;
        const endItem = Math.min(startItem + pageData.content.length - 1, pageData.totalElements);

        container.innerHTML = `
            <span class="pagination-info">${startItem}-${endItem} / ${pageData.totalElements} kayıt · sayfa ${pageData.page + 1}/${Math.max(pageData.totalPages, 1)}</span>
            <span class="pagination-buttons">
                <button class="outline" id="${containerId}-prev" ${pageData.page === 0 ? 'disabled' : ''}>‹ Önceki</button>
                <button class="outline" id="${containerId}-next" ${pageData.last ? 'disabled' : ''}>Sonraki ›</button>
            </span>
        `;

        document.getElementById(`${containerId}-prev`).onclick = () => onPageChange(pageData.page - 1);
        document.getElementById(`${containerId}-next`).onclick = () => onPageChange(pageData.page + 1);
    }

    // ---- Toast bildirim sistemi ----
    // type: 'success' | 'error' | 'info'
    const TOAST_ICONS = {
        success: '<svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        error: '<svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        info: '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2.5"/><path d="M12 11v5M12 8v.01" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>'
    };

    function showMessage(msg, isErrorOrType = false) {
        const type = isErrorOrType === true ? 'error'
                   : isErrorOrType === false ? 'success'
                   : isErrorOrType; // 'success' | 'error' | 'info' verilebilir

        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `
            <div class="toast-icon">${TOAST_ICONS[type]}</div>
            <div class="toast-text">${msg}</div>
            <div class="toast-progress"></div>
        `;
        container.appendChild(toast);

        const remove = () => {
            toast.classList.add('leaving');
            setTimeout(() => toast.remove(), 220);
        };
        const timer = setTimeout(remove, 4000);
        toast.addEventListener('click', () => { clearTimeout(timer); remove(); });
    }

    function authFetch(url, options = {}) {
        options.headers = Object.assign({ 'Authorization': authHeader }, options.headers || {});
        return fetch(url, options);
    }

    async function handleResponse(response) {
        if (response.ok) return { ok: true, data: await response.json() };
        const err = await response.json().catch(() => ({}));
        const firstMsg = err.error || Object.values(err)[0] || "İşlem reddedildi.";
        return { ok: false, message: firstMsg };
    }

    async function login() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value;
        if (!user || !pass) return showMessage("Kullanıcı adı ve parola girin", 'error');

        const candidateAuth = "Basic " + btoa(user + ":" + pass);

        try {
            const res = await fetch('/api/me', { headers: { 'Authorization': candidateAuth } });
            if (!res.ok) return showMessage("Kullanıcı adı veya parola hatalı", 'error');
            const me = await res.json();
            authHeader = candidateAuth;

            document.getElementById('login-section').classList.add('hidden');

            currentRole = me.role;

            if (me.role === 'ROLE_ADMIN') {
                document.getElementById('admin-display').textContent = me.username.toUpperCase();
                document.getElementById('admin-section').classList.remove('hidden');
                await loadAdminUsers();
                await loadAdminTransactions();
            } else {
                document.getElementById('user-display').textContent = me.username.toUpperCase();
                document.getElementById('dashboard-section').classList.remove('hidden');
                await loadUserBalances();
                await loadUserHistory();
            }

            showMessage(`Hoş geldin, ${me.username}`, 'success');
            connectWebSocket();
        } catch (e) {
            showMessage("Sunucuya bağlanılamadı.", 'error');
        }
    }

    // ---- WebSocket (STOMP üzerinden canlı bildirimler) ----
    let stompClient = null;
    let currentRole = "";

    function connectWebSocket() {
        const socket = new SockJS('/ws');
        stompClient = new StompJs.Client({
            webSocketFactory: () => socket,
            connectHeaders: { Authorization: authHeader },
            reconnectDelay: 4000,
            onConnect: () => {
                if (currentRole === 'ROLE_ADMIN') {
                    // Herhangi bir kullanıcı işlem yaptığında admin paneli canlı güncellenir.
                    // Elle satır eklemek yerine (pagination toplamları yanlış kalırdı),
                    // içinde bulunulan sayfayı sunucudan tazeliyoruz - toplam kayıt sayısı,
                    // sayfa sayısı gibi bilgiler de her zaman doğru kalır.
                    stompClient.subscribe('/topic/admin/transactions', () => {
                        loadAdminTransactions(adminTransactionsPage);
                        loadAdminUsers(adminUsersPage);
                    });
                } else {
                    // Bakiyem (transfer ile gelen para dahil) anlık güncellenir
                    stompClient.subscribe('/user/queue/balance', (msg) => {
                        const dto = JSON.parse(msg.body);
                        document.getElementById('user-balances').innerHTML = renderBalanceRows(dto.wallets);
                        loadUserHistory(userHistoryPage);
                        showMessage("Bakiyeniz güncellendi (canlı)", 'info');
                    });
                }
            }
        });
        stompClient.activate();
    }

    function logout() {
        if (stompClient) { stompClient.deactivate(); stompClient = null; }
        authHeader = "";
        document.getElementById('login-section').classList.remove('hidden');
        document.getElementById('dashboard-section').classList.add('hidden');
        document.getElementById('admin-section').classList.add('hidden');
        document.getElementById('username').value = "";
        document.getElementById('password').value = "";
    }

    function renderBalanceRows(wallets) {
        let html = '<tr><th>Para Birimi</th><th>Bakiye</th></tr>';
        wallets.forEach(w => { html += `<tr><td>${w.currency}</td><td>${w.balance}</td></tr>`; });
        return html;
    }

    function formatDate(ts) {
        if (!ts) return '';
        return new Date(ts).toLocaleString('tr-TR');
    }

    function typeLabel(type) {
        const map = {
            DEPOSIT: 'Yatırma', WITHDRAW: 'Çekme',
            TRANSFER_IN: 'Transfer (Gelen)', TRANSFER_OUT: 'Transfer (Giden)',
            EXCHANGE_IN: 'Döviz (Alınan)', EXCHANGE_OUT: 'Döviz (Satılan)'
        };
        return map[type] || type;
    }

    function isIncoming(type) {
        return type === 'DEPOSIT' || type === 'TRANSFER_IN' || type === 'EXCHANGE_IN';
    }

    async function loadUserBalances() {
        const res = await authFetch('/api/user/me');
        if (!res.ok) return showMessage("Bakiye bilgisi alınamadı", 'error');
        const data = await res.json();
        document.getElementById('user-balances').innerHTML = renderBalanceRows(data.wallets);
        document.getElementById('user-id-display').textContent = data.id;
        document.getElementById('user-email-display').textContent = data.email ?? '-';
    }

    async function loadUserHistory(page = 0) {
        userHistoryPage = page;
        const res = await authFetch(`/api/user/transactions?page=${page}&size=${PAGE_SIZE}`);
        if (!res.ok) return;
        const pageData = await res.json();
        let html = '<tr><th>Tarih</th><th>İşlem</th><th>Miktar</th><th>Detay</th></tr>';
        pageData.content.forEach(h => {
            const cls = isIncoming(h.type) ? 'type-in' : 'type-out';
            const detail = h.counterparty ? h.counterparty : (h.note || '-');
            html += `<tr><td>${formatDate(h.timestamp)}</td><td class="${cls}">${typeLabel(h.type)}</td><td>${h.amount} ${h.currency}</td><td>${detail}</td></tr>`;
        });
        document.getElementById('user-history').innerHTML = html;
        renderPagination('user-history-pagination', pageData, loadUserHistory);
    }

    async function transaction(type) {
        const amount = document.getElementById('amount').value;
        const currency = document.getElementById('currency').value;
        if (!amount || Number(amount) <= 0) return showMessage("Geçerli bir miktar girin", 'error');

        const response = await authFetch(`/api/user/${type}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount: Number(amount), currency })
        });
        const result = await handleResponse(response);
        if (result.ok) {
            document.getElementById('user-balances').innerHTML = renderBalanceRows(result.data.wallets);
            document.getElementById('amount').value = '';
            showMessage(type === 'deposit' ? `${amount} ${currency} başarıyla yatırıldı ✓` : `${amount} ${currency} başarıyla çekildi ✓`, 'success');
            await loadUserHistory();
        } else {
            showMessage(result.message, 'error');
        }
    }

    async function transfer() {
        const targetIdentifier = document.getElementById('transfer-target').value.trim();
        const currency = document.getElementById('transfer-currency').value;
        const amount = document.getElementById('transfer-amount').value;
        if (!targetIdentifier) return showMessage("Alıcı bilgisi (ID / e-posta / kullanıcı adı) girin", 'error');
        if (!amount || Number(amount) <= 0) return showMessage("Geçerli bir miktar girin", 'error');

        const response = await authFetch('/api/user/transfer', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ targetIdentifier, amount: Number(amount), currency })
        });
        const result = await handleResponse(response);
        if (result.ok) {
            document.getElementById('user-balances').innerHTML = renderBalanceRows(result.data.wallets);
            document.getElementById('transfer-amount').value = '';
            showMessage(`${amount} ${currency}, ${targetIdentifier} kullanıcısına gönderildi ✓`, 'success');
            await loadUserHistory();
        } else {
            showMessage(result.message, 'error');
        }
    }

    async function exchange() {
        const fromCurrency = document.getElementById('exchange-from').value;
        const toCurrency = document.getElementById('exchange-to').value;
        const amount = document.getElementById('exchange-amount').value;
        if (!amount || Number(amount) <= 0) return showMessage("Geçerli bir miktar girin", 'error');
        if (fromCurrency === toCurrency) return showMessage("Aynı para birimine dönüşüm yapılamaz", 'error');

        const response = await authFetch('/api/user/exchange', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fromCurrency, toCurrency, amount: Number(amount) })
        });
        const result = await handleResponse(response);
        if (result.ok) {
            document.getElementById('user-balances').innerHTML = renderBalanceRows(result.data.wallets);
            document.getElementById('exchange-amount').value = '';
            showMessage(`${amount} ${fromCurrency} → ${toCurrency} olarak bozduruldu ✓`, 'success');
            await loadUserHistory();
        } else {
            showMessage(result.message, 'error');
        }
    }

    async function loadAdminUsers(page = 0) {
        adminUsersPage = page;
        const res = await authFetch(`/api/admin/users?page=${page}&size=${PAGE_SIZE}`);
        if (!res.ok) return showMessage("Kullanıcı listesi alınamadı", 'error');
        const pageData = await res.json();

        let html = '<tr><th>ID</th><th>Kullanıcı</th><th>E-posta</th><th>Rol</th><th>TRY</th><th>USD</th><th>EUR</th></tr>';
        pageData.content.forEach(u => {
            const balances = {};
            u.wallets.forEach(w => balances[w.currency] = w.balance);
            html += `<tr><td>${u.id}</td><td>${u.username}</td><td>${u.email ?? '-'}</td><td>${u.role.replace('ROLE_', '')}</td><td>${balances.TRY ?? '-'}</td><td>${balances.USD ?? '-'}</td><td>${balances.EUR ?? '-'}</td></tr>`;
        });
        document.getElementById('admin-users').innerHTML = html;
        renderPagination('admin-users-pagination', pageData, loadAdminUsers);
    }

    async function loadAdminTransactions(page = 0) {
        adminTransactionsPage = page;
        const res = await authFetch(`/api/admin/transactions?page=${page}&size=${PAGE_SIZE}`);
        if (!res.ok) return;
        const pageData = await res.json();
        let html = '<tr><th>Tarih</th><th>Kullanıcı</th><th>İşlem</th><th>Miktar</th><th>Detay</th></tr>';
        pageData.content.forEach(h => {
            const cls = isIncoming(h.type) ? 'type-in' : 'type-out';
            const detail = h.counterparty ? h.counterparty : (h.note || '-');
            html += `<tr><td>${formatDate(h.timestamp)}</td><td>${h.username}</td><td class="${cls}">${typeLabel(h.type)}</td><td>${h.amount} ${h.currency}</td><td>${detail}</td></tr>`;
        });
        document.getElementById('admin-transactions').innerHTML = html;
        renderPagination('admin-transactions-pagination', pageData, loadAdminTransactions);
    }

    async function createUser() {
        const username = document.getElementById('new-username').value.trim();
        const email = document.getElementById('new-email').value.trim();
        const password = document.getElementById('new-password').value;
        if (!username || !email || !password) return showMessage("Kullanıcı adı, e-posta ve parola girin", 'error');

        const res = await authFetch('/api/admin/create-user', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
        });
        const result = await handleResponse(res);
        if (result.ok) {
            showMessage(`${username} kullanıcısı oluşturuldu ✓`, 'success');
            document.getElementById('new-username').value = '';
            document.getElementById('new-email').value = '';
            document.getElementById('new-password').value = '';
            await loadAdminUsers();
        } else {
            showMessage(result.message, 'error');
        }
    }
</script>
</body>
</html>
