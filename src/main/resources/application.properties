spring.application.name=bank
server.port=8080

# ---- PostgreSQL (kalicI veritabanI) ----.
spring.datasource.url=jdbc:postgresql://localhost:5433/bankdb
spring.datasource.username=bank
spring.datasource.password=bank
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
# Hibernate'in ürettiği her SQL sorgusunu (application.log ve docker logs bank-app'te)
# okunabilir/formatlı şekilde göster - "para yatırıldığında hangi UPDATE gitti" gibi
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=false

# ---- Redis (cache + Redisson dagitik kilit) ----
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Spring Cache -> Redis
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

# Redisson'un kendi baglanti adresi (RedissonConfig bunu okur)
redisson.address=redis://localhost:6379

# ---- RabbitMQ (islem olaylarinin (event) yayinlanmasi) ----
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5673
spring.rabbitmq.username=bank
spring.rabbitmq.password=bank

# Swagger erisimi
springdoc.swagger-ui.path=/swagger-ui.html

# ---- Actuator (saglik kontrolu / izleme) ----
# http://localhost:8080/actuator/health -> uygulamanin, veritabaninin, redis'in ve
# rabbitmq'nun canli olup olmadigini JSON olarak gosterir. docker-compose'daki app
# servisi de gercek bir sistemde bu endpoint uzerinden "hazir mi" kontrolu yapabilir.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
