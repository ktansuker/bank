spring.application.name=bank
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5433/bankdb
spring.datasource.username=bank
spring.datasource.password=bank
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.cache.type=redis
spring.cache.redis.time-to-live=300000

redisson.address=redis://localhost:6379

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5673
spring.rabbitmq.username=bank
spring.rabbitmq.password=bank

springdoc.swagger-ui.path=/swagger-ui.html
