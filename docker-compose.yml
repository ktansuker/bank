services:
  postgres:
    image: postgres:16
    container_name: bank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bankdb
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank
    ports:
      - "5433:5432"
    volumes:
      - bank-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: bank-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  pgadmin:
    image: dpage/pgadmin4
    container_name: bank-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bank.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

  rabbitmq:
    image: rabbitmq:3-management
    container_name: bank-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: bank
      RABBITMQ_DEFAULT_PASS: bank
    ports:
      - "5673:5672"
      - "15673:15672"

volumes:
  bank-postgres-data:
